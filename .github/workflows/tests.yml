name: Regulatory Review — Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          # Install ALL dependencies including AI modules
          pip install -r requirements.txt
        continue-on-error: true

      - name: Run test suite
        env:
          REGULATORY_DB_PATH: ":memory:"
          PYTHONIOENCODING: utf-8
          SKIP_AI_TESTS: "1"
        run: |
          pytest tests/ \
            --tb=short \
            -v \
            --cov=scripts.review \
            --cov=database \
            --cov=auth \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80
        continue-on-error: true

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: ./coverage.xml
          flags: unittests
          name: regulatory-review-coverage
          fail_ci_if_error: false

      - name: Upload HTML coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html-py${{ matrix.python-version }}
          path: htmlcov/
          retention-days: 14

  lint:
    name: Code quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tools
        run: |
          pip install flake8 black

      - name: Run flake8
        run: |
          flake8 scripts/ database/ auth/ ai/ \
            --config=.flake8 || true
        continue-on-error: true

      - name: Check black formatting
        run: |
          black --check --line-length=110 scripts/ database/ auth/ ai/ || true
        continue-on-error: true
