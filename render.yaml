# 🚀 Deploy to Render

services:
  - type: web
    name: regulatory-review
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run scripts/web_dashboard.py --server.port=$PORT --server.address=0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: STREAMLIT_SERVER_PORT
        value: 10000
      - key: STREAMLIT_SERVER_HEADLESS
        value: "true"
      - key: STREAMLIT_SERVER_ENABLE_CORS
        value: "false"
    healthCheckPath: /_stcore/health
    autoDeploy: true
