[pytest]
# ── Test discovery ────────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Output ────────────────────────────────────────────────────────────────────
addopts =
    --tb=short
    --strict-markers
    -v
    --cov=scripts.review
    --cov=database
    --cov=auth
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=80

# ── Markers ───────────────────────────────────────────────────────────────────
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (database required)
    auth: Authentication and session tests
    regulatory: Regulatory logic and TFDA compliance tests

# ── Logging ───────────────────────────────────────────────────────────────────
log_cli = false
log_level = WARNING

# ── Encoding (Windows) ───────────────────────────────────────────────────────
# Ensure UTF-8 output for CJK characters in regulatory schemas
filterwarnings =
    ignore::DeprecationWarning:streamlit
    ignore::DeprecationWarning:bcrypt
